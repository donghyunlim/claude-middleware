version: '0.1'
project:
  name: claude-middleware
  description: >
    Claude Code 플러그인 마켓플레이스. 두 개의 독립 플러그인을 monorepo로 관리한다.
    middleware 플러그인은 .middleware/ 프로젝트 지식을 읽어 AI 작업 품질을 높이고,
    wrxp 플러그인은 의도 정제 → 재귀 분해 → 에이전트 매칭 → DAG 기반 병렬 실행을 오케스트레이션한다.
architecture:
  style: Monorepo marketplace with independent plugins
  overview: |
    .claude-plugin/marketplace.json이 두 플러그인을 정의한다.
    middleware (source: ./) — 루트에 skills/, hooks/ 배치
    wrxp (source: ./wrxp) — wrxp/ 서브디렉토리에 독립 package.json + skills/
    각 플러그인은 독립 버전 관리. marketplace.json의 version 필드가 Claude Code의 latest 판정 기준.
  principles:
  - id: arch-001
    rule: 두 플러그인은 완전 독립. middleware 변경이 wrxp에 영향 없어야 한다.
    reason: 마켓플레이스 구조에서 각 플러그인은 source 경로로 격리됨
  - id: arch-002
    rule: 스킬 파일(SKILL.md)이 유일한 인터페이스. 코드 로직은 스킬 내 자연어로 정의.
    reason: Claude Code 플러그인은 SKILL.md를 읽어 동작을 결정. 실행 코드가 아닌 지시서 형태.
  - id: arch-003
    rule: hooks.json의 UserPromptSubmit 훅은 경량이어야 한다 (5초 타임아웃).
    reason: 매 메시지마다 실행되므로 무거우면 UX 저하
  - id: arch-004
    rule: middleware 플러그인은 YAML(v1)과 Graphiti(v2) 듀얼 백엔드를 지원한다.
    reason: 기존 YAML 사용자의 하위호환 + 신규 Graphiti KG 지원
  - id: arch-005
    rule: wrxp의 /ha가 canonical 파이프라인. /haq, /haqq, /haqqq는 thin shim.
    reason: 로직 중복 방지. depth config만 다르고 7-phase 로직은 /ha에 집중.
tech_stack:
  runtime: Claude Code plugin system (SKILL.md + hooks.json)
  languages: Bash (hooks), Markdown (skills), Python (post-commit hook)
  storage: Graphiti KG (FalkorDB backend) via MCP
  delivery: GitHub marketplace (claude plugin add github:donghyunlim/claude-middleware)
constraints:
- id: con-001
  rule: marketplace.json의 plugins[].version을 bump해야 다른 컴퓨터에서 업데이트 감지
- id: con-002
  rule: wrxp/의 파일을 수정하면 wrxp version도 bump해야 함
- id: con-003
  rule: hooks/check-middleware.sh는 5초 안에 완료되어야 함 (hooks.json timeout)
- id: con-004
  rule: SKILL.md의 allowed-tools에 명시되지 않은 도구는 스킬 내에서 사용 불가
